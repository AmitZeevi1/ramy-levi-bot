services:
  - type: web
    name: rami-levy-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: GREEN_API_INSTANCE_ID
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
      - key: RAMI_LEVY_API_KEY
        sync: false
      - key: RAMI_LEVY_ECOM_TOKEN
        sync: false
      - key: RAMI_LEVY_COOKIE
        sync: false
      - key: RAMI_LEVY_STORE_ID
        value: 331
      - key: NODE_ENV
        value: production
